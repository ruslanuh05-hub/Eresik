# Render Blueprint: JetVPN Bot
# https://docs.render.com/blueprint-spec

services:
  - type: web
    name: jvpn-bot
    runtime: python

    buildCommand: pip install -r requirements.txt
    startCommand: python main.py

    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: FREKASSA_SHOP_ID
        sync: false
      - key: FREKASSA_SECRET_1
        sync: false
      - key: FREKASSA_SECRET_2
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: jvpn-db
          property: connectionString

databases:
  - name: jvpn-db
    plan: free
